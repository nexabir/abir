<!DOCTYPE html>
<html lang="en" prefix="og: http://ogp.me/ns#">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Md. Abir Ul Islam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Open Graph / Social Previews -->
    <meta property="og:type" content="article">
    <meta property="og:title" content="Blog | Md. Abir Ul Islam">
    <meta property="og:description" content="Insights on Business Analysis, Data Analytics, and AI.">
    <meta property="og:image" content="https://nexabir.com/social_preview.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <style>
        body { padding-top: 80px; }
        .blog-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 8%;
        }
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }
        .blog-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 1.5rem;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .blog-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-1);
        }
        .blog-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 1rem;
        }
        .blog-date {
            font-size: 0.85rem;
            color: var(--accent-1);
            margin-bottom: 0.5rem;
            display: block;
        }
        .blog-card h3 { text-transform: none; font-size: 1.3rem; margin-bottom: 0.5rem; }
        .blog-card p { font-size: 0.95rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .blog-post { display: none; }
        .blog-post.active { display: block; }
        .blog-list.hidden { display: none; }
        
        .post-header { margin-bottom: 2rem; }
        .post-title { font-size: 2.5rem; margin-bottom: 1rem; }
        .post-meta { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
        .post-content img { max-width: 100%; border-radius: 10px; margin: 1.5rem 0; }
        .post-content iframe { width: 100%; aspect-ratio: 16/9; border-radius: 10px; border: none; margin: 1.5rem 0; }
        .post-content p { font-size: 1.1rem; line-height: 1.8; margin-bottom: 1.5rem; color: var(--text-primary); }
        .post-content a { color: var(--accent-1); text-decoration: none; font-weight: 600; }
        .post-content a:hover { text-decoration: underline; }

        /* Tables */
        .post-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            overflow: hidden;
        }
        .post-content th, .post-content td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }
        .post-content th {
            background: rgba(255,255,255,0.05);
            font-weight: 800;
        }

        .chart-container {
            margin: 2rem 0;
            padding: 1.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
        }

        .share-row {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        @media print {
            .glass-header, .share-row, .secondary-btn, #comments-section { display: none !important; }
            body { background: white !important; color: black !important; padding: 0 !important; }
            .blog-container { max-width: 100% !important; margin: 0 !important; padding: 2rem !important; }
            .post-title { color: black !important; }
            .post-content p { color: black !important; font-size: 11pt; }
        }
    </style>
</head>
<body data-theme="day">
    <script>
        const savedTheme = localStorage.getItem('theme') || 'day';
        document.body.setAttribute('data-theme', savedTheme);
    </script>

    <header class="glass-header visible" style="transform:none; pointer-events:auto; opacity:1;">
        <div class="header-content">
            <div class="header-titles">
                <h3>Md. Abir Ul Islam</h3>
                <p>Business Analyst</p>
            </div>
            <div class="header-actions" style="display: flex; gap: 10px;">
                <a href="index.html" class="btn secondary-btn mini-btn">🏠 Home</a>
            </div>
        </div>
    </header>

    <main class="blog-container">
        <!-- List View -->
        <div id="blog-list" class="blog-list">
            <h1 style="margin-bottom: 2rem;">Latest <span class="gradient-text">Articles</span></h1>
            <div class="blog-grid" id="blog-grid">
                <!-- Dynamically loaded blogs -->
            </div>
        </div>

        <!-- Post View -->
        <div id="blog-post" class="blog-post">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <button class="btn secondary-btn mini-btn" onclick="goBack()">← Back to Blogs</button>
                <button class="btn primary-btn mini-btn" onclick="window.print()">📄 Save as PDF</button>
            </div>
            <div class="post-header">
                <h1 id="post-title" class="post-title"></h1>
                <div class="post-meta" id="post-meta"></div>
            </div>
            <div id="post-content" class="post-content"></div>
            
            <!-- Giscus Comments & Reactions -->
            <div id="comments-section" style="margin-top: 4rem;">
                <script src="https://giscus.app/client.js"
                    data-repo="nexabir/abir"
                    data-repo-id="R_kgDON7uPnw"
                    data-category="Announcements"
                    data-category-id="DIC_kwDON7uPn84Cm6-u"
                    data-mapping="pathname"
                    data-strict="0"
                    data-reactions-enabled="1"
                    data-emit-metadata="0"
                    data-input-position="bottom"
                    data-theme="preferred_color_scheme"
                    data-lang="en"
                    crossorigin="anonymous"
                    async>
                </script>
            </div>
            
            <div class="share-row">
                <strong>Share this article:</strong>
                <a href="#" id="share-linkedin" target="_blank" class="btn linkedin-btn mini-btn">LinkedIn</a>
                <a href="#" id="share-twitter" target="_blank" class="btn secondary-btn mini-btn">Twitter</a>
                <a href="#" id="share-facebook" target="_blank" class="btn secondary-btn mini-btn">Facebook</a>
            </div>
        </div>
    </main>

    <script>
        let blogs = [];

        async function loadBlogs() {
            try {
                const response = await fetch(`content.json?v=${Date.now()}`);
                const data = await response.json();
                blogs = data.blogs || [];
                
                const urlParams = new URLSearchParams(window.location.search);
                const postId = urlParams.get('id');

                if (postId) {
                    showPost(postId);
                } else {
                    renderList();
                }
            } catch (e) {
                console.error("Failed to load blogs");
            }
        }

        function renderList() {
            const grid = document.getElementById('blog-grid');
            if (blogs.length === 0) {
                grid.innerHTML = "<p>No articles published yet.</p>";
                return;
            }

            // Sort newest first
            const sorted = [...blogs].sort((a,b) => b.timestamp - a.timestamp);

            grid.innerHTML = sorted.map(b => `
                <div class="blog-card" onclick="window.location.href='?id=${b.id}'">
                    ${b.image ? `<img src="${b.image}" alt="Cover">` : ''}
                    <span class="blog-date">${new Date(b.timestamp).toLocaleDateString()}</span>
                    <h3>${b.title}</h3>
                    <p>${b.snippet}</p>
                </div>
            `).join('');
        }

        function showPost(id) {
            const post = blogs.find(b => b.id == id);
            if (!post) {
                window.location.href = 'blog.html';
                return;
            }

            document.getElementById('blog-list').classList.add('hidden');
            document.getElementById('blog-post').classList.add('active');

            document.getElementById('post-title').innerText = post.title;
            document.getElementById('post-meta').innerText = `Published on ${new Date(post.timestamp).toLocaleDateString()}`;
            
            // Process Charts
            let content = post.content;
            const chartRegex = /\[CHART_START\](.*?)\[CHART_END\]/g;
            let match;
            const chartConfigs = [];
            
            while ((match = chartRegex.exec(content)) !== null) {
                const configId = `chart-${Math.random().toString(36).substr(2, 9)}`;
                chartConfigs.push({ id: configId, json: match[1] });
                content = content.replace(match[0], `<div class="chart-container"><canvas id="${configId}"></canvas></div>`);
            }

            document.getElementById('post-content').innerHTML = content;

            // Initialize Charts after content is in DOM
            chartConfigs.forEach(c => {
                try {
                    const ctx = document.getElementById(c.id).getContext('2d');
                    new Chart(ctx, JSON.parse(c.json));
                } catch (e) { console.error("Chart Error", e); }
            });

            const url = encodeURIComponent(window.location.href);
            const title = encodeURIComponent(post.title);
            
            document.getElementById('share-linkedin').href = `https://www.linkedin.com/sharing/share-offsite/?url=${url}`;
            document.getElementById('share-twitter').href = `https://twitter.com/intent/tweet?url=${url}&text=${title}`;
            document.getElementById('share-facebook').href = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
        }

        function goBack() {
            window.location.href = 'blog.html';
        }

        loadBlogs();
    </script>
</body>
</html>
